name: Build & Release Android APK

# Declansat la orice tag de forma v1.2.3
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# GITHUB_TOKEN trebuie sa poata crea release-uri
permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. JDK 17 ──────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle cache ────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 4. Decodeaza keystore-ul (stocat ca secret Base64) ─────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apaoltenia.jks

      # ── 5. Extrage versiunea din tag (v1.2.3 → 1.2.3) ─────────────
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          echo "TAG=$TAG"     >> $GITHUB_OUTPUT
          echo "VERSION=$VER" >> $GITHUB_OUTPUT

      # ── 6. Build APK release semnat ────────────────────────────────
      # Cheia si parolele vin din secrets, prin variabile de mediu citite
      # in app/build.gradle.kts (KEYSTORE_FILE / KEYSTORE_PASSWORD / ...).
      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/apaoltenia.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ── 7. Redenumeste APK cu versiunea ────────────────────────────
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "ApaOltenia-v${{ steps.version.outputs.VERSION }}.apk"

      # ── 8. Creeaza GitHub Release cu APK-ul ────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "ApaOltenia Client v${{ steps.version.outputs.VERSION }}"
          body: |
            ## ApaOltenia Client v${{ steps.version.outputs.VERSION }}

            ### Instalare manuala
            1. Descarca fisierul `.apk` de mai jos
            2. Pe telefon: **Setari → Securitate → Instalare aplicatii necunoscute**
            3. Deschide fisierul si instaleaza

            > Din aplicatie: **Setari → Verifica actualizari** iti spune cand apare
            > o versiune noua si te trimite direct la descarcare.
          files: "ApaOltenia-v${{ steps.version.outputs.VERSION }}.apk"
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
